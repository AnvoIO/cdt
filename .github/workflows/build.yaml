name: "Build & Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  Build:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          # ARM64 builds require self-hosted runner
          # - os: [self-hosted, arm64]
          #   arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libxml2-dev python3

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j $(nproc)

      - name: Run tests
        run: |
          cd build/tests
          ctest -j $(nproc) --output-on-failure

      - name: Package
        if: matrix.arch == 'amd64'
        run: |
          cd build/packages
          bash generate_package.sh deb ubuntu-24.04 amd64

      - name: Upload package
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: cdt_ubuntu_package_amd64
          path: build/packages/cdt*amd64.deb
